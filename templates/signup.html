<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="Connect - Create your account">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
    
    <title>Connect - Signup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #EDE9FE;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 440px;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            text-align: center;
            font-size: 1.75rem;
            font-weight: 600;
            color: #1a202c;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            color: #2d3748;
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            padding: 0.875rem;
            border: 1px solid #d4d8e8;
            border-radius: 8px;
            font-size: 1rem;
            color: #1a202c;
            background-color: #f8fafc;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: #A78BFA;
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.1);
        }

        input::placeholder {
            color: #9ca3af;
        }

        input.invalid {
            border-color: #dc2626;
        }

        .toggle-password {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #6b7280;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.25rem 0.5rem;
            transition: color 0.2s ease;
        }

        .toggle-password:hover {
            color: #A78BFA;
        }

        button[type="submit"] {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(90deg, #A78BFA, #7C3AED);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        button[type="submit"]:hover {
            background: linear-gradient(90deg, #7C3AED, #6D28D9);
            transform: translateY(-2px);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        button[type="submit"]:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            color: #dc2626;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
        }

        .server-error {
            color: #dc2626;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 1rem;
            display: none;
        }

        .link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #4a5568;
        }

        .link a {
            color: #A78BFA;
            text-decoration: none;
            font-weight: 500;
        }

        .link a:hover {
            text-decoration: underline;
        }

        .password-requirements {
            font-size: 0.8rem;
            color: #6b7280;
            margin-top: 0.5rem;
            padding: 0.5rem;
            background: #f8fafc;
            border-radius: 4px;
        }

        .password-requirements ul {
            margin: 0;
            padding-left: 1.2rem;
        }

        .password-requirements li {
            margin-bottom: 0.25rem;
        }

        @media (max-width: 480px) {
            .container {
                padding: 1.5rem;
                margin: 1rem;
            }

            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Join Connect</h1>
        <div id="serverError" class="server-error" role="alert" aria-live="polite"></div>
        
        <form id="signupForm" action="/signup" method="POST" novalidate>
            <!-- CSRF Token (should be generated by server) -->
            <input type="hidden" name="_csrf" id="csrfToken" value="">
            
            <div class="form-group">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    required 
                    placeholder="Enter your username"
                    autocomplete="username"
                    aria-describedby="usernameError"
                    minlength="3"
                    maxlength="20"
                    pattern="^[a-zA-Z0-9_]{3,20}$"
                >
                <div id="usernameError" class="error" role="alert"></div>
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required 
                    placeholder="Enter your email"
                    autocomplete="email"
                    aria-describedby="emailError"
                    maxlength="100"
                >
                <div id="emailError" class="error" role="alert"></div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required 
                        placeholder="Enter your password"
                        autocomplete="new-password"
                        aria-describedby="passwordError passwordRequirements"
                        minlength="8"
                        maxlength="50"
                    >
                    <button type="button" class="toggle-password" onclick="togglePassword('password', this)" aria-label="Toggle password visibility">Show</button>
                </div>
                <div id="passwordError" class="error" role="alert"></div>
                <div id="passwordRequirements" class="password-requirements">
                    <strong>Password requirements:</strong>
                    <ul>
                        <li>At least 8 characters long</li>
                        <li>One uppercase letter (A-Z)</li>
                        <li>One lowercase letter (a-z)</li>
                        <li>One number (0-9)</li>
                        <li>One special character (@$!%*?&)</li>
                    </ul>
                </div>
            </div>
            
            <div class="form-group">
                <label for="repassword">Confirm Password</label>
                <div class="input-wrapper">
                    <input 
                        type="password" 
                        id="repassword" 
                        name="repassword" 
                        required 
                        placeholder="Confirm your password"
                        autocomplete="new-password"
                        aria-describedby="repasswordError"
                        minlength="8"
                        maxlength="50"
                    >
                    <button type="button" class="toggle-password" onclick="togglePassword('repassword', this)" aria-label="Toggle password visibility">Show</button>
                </div>
                <div id="repasswordError" class="error" role="alert"></div>
            </div>
            
            <button type="submit" id="submitBtn">Sign Up</button>
        </form>
        
        <div class="link">
            Already have an account? <a href="/login">Log in</a>
        </div>
    </div>

    <script>
        // Security: Sanitize input to prevent XSS
        function sanitizeInput(input) {
            const div = document.createElement('div');
            div.textContent = input;
            return div.innerHTML;
        }

        // Security: Validate username
        function validateUsername(username) {
            const usernameRegex = /^[a-zA-Z0-9_]{3,20}$/;
            if (!username) return "Username is required";
            if (username.length < 3) return "Username must be at least 3 characters long";
            if (username.length > 20) return "Username must be 20 characters or less";
            if (!usernameRegex.test(username)) return "Username can only contain letters, numbers, and underscores";
            return "";
        }

        // Security: Validate email format
        function validateEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email) return "Email is required";
            if (email.length > 100) return "Email must be 100 characters or less";
            if (!emailRegex.test(email)) return "Please enter a valid email address";
            return "";
        }

        // Security: Validate password with strength requirements
        function validatePassword(password) {
            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,50}$/;
            if (!password) return "Password is required";
            if (!passwordRegex.test(password)) {
                return "Password must be 8-50 characters long, with at least one uppercase letter, one lowercase letter, one number, and one special character";
            }
            return "";
        }

        // Security: Validate confirm password
        function validateConfirmPassword(password, repassword) {
            if (!repassword) return "Confirm password is required";
            if (password !== repassword) return "Passwords do not match";
            return "";
        }

        // Toggle password visibility
        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            button.textContent = isPassword ? 'Hide' : 'Show';
            button.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
        }

        // Show error message
        function showError(elementId, message) {
            const errorElement = document.getElementById(elementId);
            errorElement.textContent = message;
            errorElement.style.display = 'block';
        }

        // Hide error message
        function hideError(elementId) {
            const errorElement = document.getElementById(elementId);
            errorElement.style.display = 'none';
        }

        // Show server error
        function showServerError(message) {
            const serverError = document.getElementById('serverError');
            serverError.textContent = message;
            serverError.style.display = 'block';
        }

        // Real-time validation on blur
        const inputs = {
            username: document.getElementById('username'),
            email: document.getElementById('email'),
            password: document.getElementById('password'),
            repassword: document.getElementById('repassword')
        };

        const errors = {
            username: document.getElementById('usernameError'),
            email: document.getElementById('emailError'),
            password: document.getElementById('passwordError'),
            repassword: document.getElementById('repasswordError')
        };

        Object.keys(inputs).forEach(field => {
            inputs[field].addEventListener('blur', function() {
                validateField(field);
            });
        });

        function validateField(field) {
            const value = inputs[field].value.trim();
            let error = "";

            if (field === "username") error = validateUsername(value);
            if (field === "email") error = validateEmail(value);
            if (field === "password") error = validatePassword(value);
            if (field === "repassword") error = validateConfirmPassword(inputs.password.value, value);

            if (error) {
                showError(field + 'Error', error);
                inputs[field].classList.add('invalid');
            } else {
                hideError(field + 'Error');
                inputs[field].classList.remove('invalid');
            }
        }

        // Form submission with validation
        document.getElementById('signupForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            
            // Validate all fields
            const usernameError = validateUsername(inputs.username.value.trim());
            const emailError = validateEmail(inputs.email.value.trim());
            const passwordError = validatePassword(inputs.password.value);
            const repasswordError = validateConfirmPassword(inputs.password.value, inputs.repassword.value);

            // Show/hide errors
            if (usernameError) {
                showError('usernameError', usernameError);
                inputs.username.classList.add('invalid');
            } else {
                hideError('usernameError');
                inputs.username.classList.remove('invalid');
            }

            if (emailError) {
                showError('emailError', emailError);
                inputs.email.classList.add('invalid');
            } else {
                hideError('emailError');
                inputs.email.classList.remove('invalid');
            }

            if (passwordError) {
                showError('passwordError', passwordError);
                inputs.password.classList.add('invalid');
            } else {
                hideError('passwordError');
                inputs.password.classList.remove('invalid');
            }

            if (repasswordError) {
                showError('repasswordError', repasswordError);
                inputs.repassword.classList.add('invalid');
            } else {
                hideError('repasswordError');
                inputs.repassword.classList.remove('invalid');
            }

            // If no errors, submit the form
            if (!usernameError && !emailError && !passwordError && !repasswordError) {
                // Disable submit button to prevent double submission
                submitBtn.disabled = true;
                submitBtn.textContent = 'Creating account...';

                const data = {
                    username: inputs.username.value.trim(),
                    email: inputs.email.value.trim(),
                    password: inputs.password.value,
                    repassword: inputs.repassword.value
                };

                try {
                    const response = await fetch('/signup', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'X-Requested-With': 'XMLHttpRequest'
                        },
                        body: JSON.stringify(data)
                    });

                    const result = await response.json();
                    
                    if (!result.success) {
                        showServerError(result.message);
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Sign Up';
                    } else {
                        // Success - redirect to login
                        window.location.href = "/login?registered=true";
                    }
                } catch (error) {
                    showServerError('An error occurred. Please try again.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Sign Up';
                }
            }
        });

        // Security: Prevent form resubmission on page load
        if (window.history.replaceState) {
            window.history.replaceState(null, null, window.location.href);
        }
    </script>
</body>
</html>
